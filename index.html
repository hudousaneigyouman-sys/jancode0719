<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>コードメモ</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header class="app-header">
    <div>
      <h1>コードメモ</h1>
      <p>コードと商品名だけで、すぐ登録・検索</p>
    </div>
    <button id="exportBtn" class="ghost small">CSV保存</button>
  </header>

  <main>
    <section class="search-panel card">
      <label for="searchInput">商品を検索</label>
      <div class="search-box-row">
        <input id="searchInput" type="search" placeholder="商品名またはコードを1文字以上入力" autocomplete="off" />
        <button id="searchBtn" class="primary" type="button">検索</button>
      </div>
      <p class="search-help">1文字入力して「検索」を押すと、登録済みの商品を一覧表示します。</p>
      <button id="scanSearchBtn" class="secondary full" type="button">📷 バーコードで検索</button>
      <div class="search-actions">
        <button id="showAllBtn" class="ghost">すべて表示</button>
        <button id="clearSearchBtn" class="ghost">検索を消す</button>
      </div>
    </section>

    <section id="listSection" class="card">
      <div class="section-title-row">
        <h2 id="listTitle">登録一覧</h2>
        <span id="countBadge" class="badge">0件</span>
      </div>
      <div id="itemList" class="item-list" aria-live="polite"></div>
      <p id="emptyMessage" class="empty">まだ商品が登録されていません。</p>
    </section>
  </main>

  <button id="openAddBtn" class="fab" aria-label="商品を追加">＋</button>

  <dialog id="addDialog">
    <form id="addForm" method="dialog" class="dialog-card">
      <div class="dialog-head">
        <h2>商品を追加</h2>
        <button type="button" id="closeAddBtn" class="icon-btn" aria-label="閉じる">×</button>
      </div>

      <label for="codeInput">コード <strong>必須</strong></label>
      <div class="input-with-button">
        <input id="codeInput" required placeholder="JANコード・管理コードなど" inputmode="text" />
        <button type="button" id="scanCodeBtn" class="secondary">📷 読取</button>
      </div>

      <label for="nameInput">商品名 <strong>必須</strong></label>
      <input id="nameInput" required placeholder="自由に分かりやすい名前を入力" />

      <details>
        <summary>任意項目を開く</summary>
        <label for="memoInput">メモ</label>
        <textarea id="memoInput" rows="3" placeholder="購入先、用途など"></textarea>
      </details>

      <p id="formError" class="error" role="alert"></p>
      <div class="dialog-actions">
        <button type="button" id="saveAndContinueBtn" class="secondary">登録して次を追加</button>
        <button type="submit" class="primary">登録する</button>
      </div>
    </form>
  </dialog>

  <dialog id="bulkDialog">
    <div class="dialog-card wide">
      <div class="dialog-head">
        <h2>撮影でまとめて追加</h2>
        <button type="button" id="closeBulkBtn" class="icon-btn" aria-label="閉じる">×</button>
      </div>
      <p class="hint">メモ帳のリストをその場で撮影すると、文字を読み取り、コードと商品名の候補を作ります。1商品を1行で書いたメモが最も読み取りやすいです。</p>
      <div class="photo-actions single">
        <label class="primary file-label full">📷 メモを撮影<input id="photoInput" type="file" accept="image/*" capture="environment"></label>
      </div>
      <div id="selectedPhotos" class="selected-photos">撮影すると、自動で文字の読み取りを開始します。</div>
      <button id="ocrBtn" class="secondary full" type="button" hidden>もう一度文字を読み取る</button>
      <div id="ocrStatus" class="status" role="status"></div>
      <details class="ocr-text-details">
        <summary>読み取った文字を確認・修正する</summary>
        <textarea id="ocrRawText" rows="8" placeholder="読み取った文字がここに表示されます。修正後に「文字から候補を作り直す」を押せます。"></textarea>
        <button id="reparseOcrBtn" class="secondary full" type="button">文字から候補を作り直す</button>
      </details>
      <div id="bulkRows" class="bulk-rows"></div>
      <div class="dialog-actions">
        <button id="addBulkRowBtn" class="ghost">＋ 行を追加</button>
        <button id="registerBulkBtn" class="primary">選択した商品を登録</button>
      </div>
    </div>
  </dialog>

  <dialog id="detailDialog">
    <div class="dialog-card">
      <div class="dialog-head">
        <h2>商品詳細</h2>
        <button type="button" id="closeDetailBtn" class="icon-btn" aria-label="閉じる">×</button>
      </div>
      <label>コード</label>
      <input id="detailCode" />
      <label>商品名</label>
      <input id="detailName" />
      <label>メモ</label>
      <textarea id="detailMemo" rows="3"></textarea>
      <div class="dialog-actions split">
        <button id="deleteBtn" class="danger">削除</button>
        <button id="updateBtn" class="primary">変更を保存</button>
      </div>
    </div>
  </dialog>


  <dialog id="scannerDialog">
    <div class="dialog-card wide scanner-card">
      <div class="dialog-head">
        <h2>バーコードを読み取る</h2>
        <button type="button" id="closeScannerBtn" class="icon-btn" aria-label="閉じる">×</button>
      </div>
      <p class="hint">バーコード全体が枠内に入るように、少し離して映してください。</p>
      <div class="scanner-frame"><video id="scannerVideo" playsinline muted></video><div class="scan-line"></div></div>
      <p id="scannerStatus" class="status" role="status">カメラを起動します…</p>
      <div class="dialog-actions">
        <label class="ghost file-label">写真から読む<input id="barcodePhotoInput" type="file" accept="image/*" capture="environment"></label>
        <button type="button" id="retryScannerBtn" class="primary">カメラを再起動</button>
      </div>
    </div>
  </dialog>

  <nav class="bottom-nav">
    <button id="navSearch" class="active">検索</button>
    <button id="navAdd">1件追加</button>
    <button id="navBulk">撮影で追加</button>
  </nav>
</body>
</html>
